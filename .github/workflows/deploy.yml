# GitHub Actions 워크플로우 이름
name: Deploy to GitHub Pages

# 언제 이 액션을 실행할 것인가: main 브랜치에 push 이벤트가 발생했을 때
on:
  push:
    branches:
      - main # 또는 master 브랜치를 사용한다면 master로 변경

# 권한 설정: gh-pages 브랜치에 코드를 쓸 수 있도록 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 실행할 작업들 정의
jobs:
  # build-and-deploy 라는 이름의 작업
  build-and-deploy:
    # 실행 환경: 최신 우분투
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃: main 브랜치의 소스코드를 가져옴
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정: Node.js 18.x 버전 사용
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. 의존성 설치: npm install과 동일
      - name: Install dependencies
        run: npm install

      # 4. 프로젝트 빌드: vite.config.js의 base 설정을 참조하여 빌드
      - name: Build
        run: npm run build

      # 5. GitHub Pages에 배포 설정
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. 빌드 결과물(dist 폴더)을 아티팩트로 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 7. 배포 실행: 업로드된 아티팩트를 gh-pages 브랜치에 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
